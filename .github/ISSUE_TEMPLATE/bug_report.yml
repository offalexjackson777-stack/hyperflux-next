# Generated by ./hfx generate. Do not edit manually.
name: Bug report
description: Report incorrect behavior with privacy-safe diagnostic context.
title: '[Bug]: '
labels:
- 'kind: bug'
body:
- type: markdown
  attributes:
    value: Run `hyperfluxctl doctor` first. Never attach hardware serials, raw HID or USB payloads, private paths, captures, or memory dumps.
- type: textarea
  id: outcome
  attributes:
    label: What happened?
    description: Describe the observed result and the result you expected.
    placeholder: |-
      Observed:
      Expected:
  validations:
    required: true
- type: input
  id: environment
  attributes:
    label: Environment
    description: Distribution, kernel, package version, and application adapter.
    placeholder: Arch Linux; 6.x; 0.x; OpenRGB
  validations:
    required: true
- type: input
  id: doctor-reference
  attributes:
    label: Doctor reference
    description: The privacy-safe hfx reference printed by hyperfluxctl doctor.
    placeholder: hfx-...
  validations:
    required: true
- type: textarea
  id: support-preview
  attributes:
    label: Support preview
    description: Paste `hyperfluxctl support-bundle --preview`. This previews bounded contents and performs no upload.
    render: json
- type: checkboxes
  id: privacy
  attributes:
    label: Privacy confirmation
    options:
    - label: I removed serials, stable host identifiers, private paths, and raw transport payloads.
      required: true

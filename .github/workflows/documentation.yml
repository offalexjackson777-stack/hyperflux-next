# Generated by ./hfx generate. Do not edit manually.
name: Documentation
'on':
  workflow_dispatch: {}
  push:
    branches:
    - main
    paths:
    - docs/**
    - schemas/documentation-portal.schema.json
    - tools/hfxdev/portal.py
    - tools/hfxdev/generators/**
    - governance/github.json
permissions:
  contents: read
concurrency:
  group: documentation-${{ github.ref }}
  cancel-in-progress: true
env:
  HFX_CI_IMAGE: hyperflux-next-dev:ci
jobs:
  portal-artifact:
    name: Offline portal artifact
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
    - name: Check out exact source
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0
        persist-credentials: false
    - name: Set up Buildx
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
    - name: Build the pinned development environment
      uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
      with:
        context: .
        file: .devcontainer/Containerfile
        load: true
        push: false
        tags: ${{ env.HFX_CI_IMAGE }}
        cache-from: type=gha,scope=hyperflux-next-development
        cache-to: type=gha,mode=max,scope=hyperflux-next-development,ignore-error=true
    - name: Build and verify the offline portal
      run: ./hfx ci docs --image "$HFX_CI_IMAGE" --output build/ci/portal
    - name: Upload hyperflux-documentation-portal
      if: ${{ always() }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: hyperflux-documentation-portal
        path: build/ci/portal
        if-no-files-found: error
        retention-days: 14

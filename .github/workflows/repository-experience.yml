# Generated by ./hfx generate. Do not edit manually.
name: Repository experience
'on':
  pull_request: {}
  workflow_dispatch: {}
permissions:
  contents: read
concurrency:
  group: repository-experience-${{ github.ref }}
  cancel-in-progress: true
env:
  HFX_CI_IMAGE: hyperflux-next-dev:ci
jobs:
  link-checks:
    name: Link checks
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
    - name: Check out exact source
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}
        fetch-depth: 0
        persist-credentials: false
    - name: Set up Buildx
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
    - name: Build the pinned development environment
      uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
      with:
        context: .
        file: .devcontainer/Containerfile
        load: true
        push: false
        tags: ${{ env.HFX_CI_IMAGE }}
        cache-from: type=gha,scope=hyperflux-next-development
        cache-to: type=gha,mode=max,scope=hyperflux-next-development,ignore-error=true
    - name: Build and verify link checks
      run: ./hfx ci docs --image "$HFX_CI_IMAGE" --output build/ci/links
    - name: Publish generated portal summary
      if: ${{ always() }}
      env:
        HFX_SOURCE_REVISION: ${{ github.event.pull_request.head.sha || github.sha }}
      run: ./hfx ci pages-summary --manifest build/ci/links/portal-build-manifest.json --output "$GITHUB_STEP_SUMMARY" --source-revision "$HFX_SOURCE_REVISION"
    - name: Upload hyperflux-link-evidence
      if: ${{ always() }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: hyperflux-link-evidence
        path: build/ci/links
        if-no-files-found: error
        retention-days: 14
  pages-preview:
    name: Pages preview
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
    - name: Check out exact source
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}
        fetch-depth: 0
        persist-credentials: false
    - name: Set up Buildx
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
    - name: Build the pinned development environment
      uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
      with:
        context: .
        file: .devcontainer/Containerfile
        load: true
        push: false
        tags: ${{ env.HFX_CI_IMAGE }}
        cache-from: type=gha,scope=hyperflux-next-development
        cache-to: type=gha,mode=max,scope=hyperflux-next-development,ignore-error=true
    - name: Build and verify pages preview
      run: ./hfx ci docs --image "$HFX_CI_IMAGE" --output build/ci/pages-preview
    - name: Publish generated portal summary
      if: ${{ always() }}
      env:
        HFX_SOURCE_REVISION: ${{ github.event.pull_request.head.sha || github.sha }}
      run: ./hfx ci pages-summary --manifest build/ci/pages-preview/portal-build-manifest.json --output "$GITHUB_STEP_SUMMARY" --source-revision "$HFX_SOURCE_REVISION"
    - name: Upload hyperflux-pages-preview
      if: ${{ always() }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: hyperflux-pages-preview
        path: build/ci/pages-preview
        if-no-files-found: error
        retention-days: 14

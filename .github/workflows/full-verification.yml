# Generated by ./hfx generate. Do not edit manually.
name: Full verification
'on':
  pull_request: {}
  workflow_dispatch: {}
  schedule:
  - cron: 17 3 * * 1
permissions:
  contents: read
concurrency:
  group: full-verification-${{ github.ref }}
  cancel-in-progress: false
env:
  HFX_CI_IMAGE: hyperflux-next-dev:ci
jobs:
  full-software:
    name: Full software
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
    - name: Check out exact source
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0
        persist-credentials: false
    - name: Restore verified software caches
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: |
          .hfx/upstreams
          .hfx/cargo
          target
        key: hfx-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'toolchains/development-environment.json', 'integrations/catalog.json') }}
        restore-keys: |
          hfx-${{ runner.os }}-
    - name: Set up Buildx
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
    - name: Build the pinned development environment
      uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
      with:
        context: .
        file: .devcontainer/Containerfile
        load: true
        push: false
        tags: ${{ env.HFX_CI_IMAGE }}
        cache-from: type=gha,scope=hyperflux-next-development
        cache-to: type=gha,mode=max,scope=hyperflux-next-development,ignore-error=true
    - name: Prepare exact upstream sources
      run: ./hfx ci prepare --image "$HFX_CI_IMAGE"
    - name: Run the complete software graph
      run: ./hfx ci verify --image "$HFX_CI_IMAGE" --lane full --output build/ci/full
    - name: Publish bounded verification summary
      if: ${{ always() }}
      env:
        HFX_SOURCE_REVISION: ${{ github.sha }}
      run: ./hfx ci summary --result build/ci/full/result.json --output "$GITHUB_STEP_SUMMARY" --source-revision "$HFX_SOURCE_REVISION"
    - name: Upload hyperflux-full-evidence
      if: ${{ always() }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: hyperflux-full-evidence
        path: build/ci/full
        if-no-files-found: error
        retention-days: 30

# Generated by ./hfx generate. Do not edit manually.
name: Pages
'on':
  push:
    branches:
    - main
  workflow_dispatch: {}
permissions:
  contents: read
concurrency:
  group: pages
  cancel-in-progress: false
env:
  HFX_CI_IMAGE: hyperflux-next-dev:ci
jobs:
  build:
    name: Build verified portal
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
    - name: Check out exact source
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}
        fetch-depth: 0
        persist-credentials: false
    - name: Set up Buildx
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
    - name: Build the pinned development environment
      uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
      with:
        context: .
        file: .devcontainer/Containerfile
        load: true
        push: false
        tags: ${{ env.HFX_CI_IMAGE }}
        cache-from: type=gha,scope=hyperflux-next-development
        cache-to: type=gha,mode=max,scope=hyperflux-next-development,ignore-error=true
    - name: Build and verify the generated portal
      run: ./hfx ci docs --image "$HFX_CI_IMAGE" --output build/ci/portal
    - name: Configure GitHub Pages
      uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
    - name: Publish generated portal summary
      if: ${{ always() }}
      env:
        HFX_SOURCE_REVISION: ${{ github.event.pull_request.head.sha || github.sha }}
      run: ./hfx ci pages-summary --manifest build/ci/portal/portal-build-manifest.json --output "$GITHUB_STEP_SUMMARY" --source-revision "$HFX_SOURCE_REVISION"
    - name: Upload the verified Pages artifact
      uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
      with:
        path: build/ci/portal
  deploy:
    name: Deploy protected Pages
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Deploy generated documentation
      id: deployment
      uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
    - name: Publish deployment status
      env:
        HFX_PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        HFX_SOURCE_REVISION: ${{ github.event.pull_request.head.sha || github.sha }}
      run: printf '# Pages deployment\n\n| Field | Result |\n| --- | --- |\n| Status | **DEPLOYED** |\n| Source revision | `%s` |\n| Environment | `github-pages` |\n| URL | %s |\n| Product release authority | Locked |\n' "$HFX_SOURCE_REVISION" "$HFX_PAGE_URL" >> "$GITHUB_STEP_SUMMARY"
